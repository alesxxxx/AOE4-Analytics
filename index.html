<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <!--
      Belt-and-braces CSP for file:// loads, where the onHeadersReceived header
      (electron/security.ts) may not fire. This one static tag is also served by
      the Vite dev server, so script-src keeps 'unsafe-inline'/'unsafe-eval' (the
      react-refresh preamble is an inline script) and connect-src allows the
      localhost HMR websocket; in production the strict header still applies on
      top wherever it fires (the effective policy is the intersection).
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' data: blob: https://data.aoe4world.com https://aoe4world.com; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' ws://localhost:* ws://127.0.0.1:*; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RTSLytics</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/renderer/main/main.tsx"></script>
  </body>
</html>
