version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # RTSLytics intentionally stays on Tailwind CSS 3.x; v4 is a large migration.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]
    groups:
      # One PR for low-risk minor/patch bumps to keep the noise down.
      minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
