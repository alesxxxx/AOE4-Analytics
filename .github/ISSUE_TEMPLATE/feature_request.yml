name: Feature request
description: Suggest an idea or improvement for RTSLytics.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: What would you like RTSLytics to do?
    validations:
      required: true
  - type: checkboxes
    id: tos
    attributes:
      label: Read-only constraint
      description: >
        RTSLytics only reads your own local files and public APIs — it never
        reads game memory or modifies the game. Please confirm your idea fits.
      options:
        - label: This can work without reading game memory or modifying the game.
          required: true
