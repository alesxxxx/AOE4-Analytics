name: Portable Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: portable-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build portable Windows release
    runs-on: windows-latest

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Choose release tag
        id: release
        shell: pwsh
        run: |
          $package = Get-Content package.json -Raw | ConvertFrom-Json
          $tag = "v$($package.version)"

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "name=RTSLytics $tag" >> $env:GITHUB_OUTPUT

      - name: Check whether a build is needed
        id: gate
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          IS_DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            if ($env:IS_DISPATCH -eq 'true') {
              throw "Release $env:RELEASE_TAG already exists. Bump package.json before rebuilding."
            }
            Write-Host "Release $env:RELEASE_TAG already exists — skipping the Windows build."
            "should_build=false" >> $env:GITHUB_OUTPUT
          } else {
            "should_build=true" >> $env:GITHUB_OUTPUT
          }

      - name: Set up Node.js
        if: ${{ steps.gate.outputs.should_build == 'true' }}
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        if: ${{ steps.gate.outputs.should_build == 'true' }}
        run: npm ci

      - name: Audit production dependencies
        if: ${{ steps.gate.outputs.should_build == 'true' }}
        run: npm audit --omit=dev --audit-level=high

      - name: Build portable executable
        if: ${{ steps.gate.outputs.should_build == 'true' }}
        run: npm run dist:verified

      - name: Prepare release artifact
        if: ${{ steps.gate.outputs.should_build == 'true' }}
        id: artifact
        shell: pwsh
        run: |
          $artifact = Get-ChildItem -Path release -Filter "*-portable.exe" -File |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1

          if (-not $artifact) {
            throw "No portable executable found in release/"
          }

          $checksum = Get-FileHash -Path $artifact.FullName -Algorithm SHA256
          $checksumPath = "$($artifact.FullName).sha256"
          "$($checksum.Hash.ToLowerInvariant())  $($artifact.Name)" |
            Out-File -FilePath $checksumPath -Encoding ascii

          "artifact_path=$($artifact.FullName)" >> $env:GITHUB_OUTPUT
          "artifact_name=$($artifact.Name)" >> $env:GITHUB_OUTPUT
          "checksum_path=$checksumPath" >> $env:GITHUB_OUTPUT

      - name: Upload workflow artifact
        if: ${{ steps.gate.outputs.should_build == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.artifact.outputs.artifact_name }}
          path: |
            ${{ steps.artifact.outputs.artifact_path }}
            ${{ steps.artifact.outputs.checksum_path }}
          if-no-files-found: error

      - name: Publish GitHub release
        if: ${{ steps.gate.outputs.should_build == 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release.outputs.tag }}
          RELEASE_NAME: ${{ steps.release.outputs.name }}
          ARTIFACT_PATH: ${{ steps.artifact.outputs.artifact_path }}
          CHECKSUM_PATH: ${{ steps.artifact.outputs.checksum_path }}
        run: |
          $notesPath = Join-Path $env:RUNNER_TEMP "release-notes.md"
          @"
          RTSLytics portable Windows build.

          Download the portable .exe and run it. No installer is required.
          "@ | Out-File -FilePath $notesPath -Encoding utf8

          gh release create $env:RELEASE_TAG $env:ARTIFACT_PATH $env:CHECKSUM_PATH `
            --title $env:RELEASE_NAME `
            --notes-file $notesPath `
            --target $env:GITHUB_SHA
